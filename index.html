<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size: 400% 400%;
    animation: gradient 8s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
}

h1{
    color:white;
    font-size:42px;
}

.typing{
    color:white;
    font-size:20px;
    border-right:2px solid white;
    display:inline-block;
    padding-right:5px;
    white-space:nowrap;
    overflow:hidden;
}

.teddy{
    font-size:120px;
    cursor:pointer;
    transition: transform 0.3s;
}

.teddy:hover{
    transform: scale(1.2);
}

.buttons{
    margin-top:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.yes{
    background:#22c55e;
    color:white;
}

.no{
    background:#ef4444;
    color:white;
    position:relative;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation: float 3s linear infinite;
}

@keyframes float{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-250px); opacity:0; }
}

</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>I'm Really Sorry  Nazma ❤️</h1>
    <p class="typing" id="text"></p>

    <div class="teddy" onclick="showLove()">🧸</div>

    <div class="buttons">
        <button class="yes" onclick="forgive()">Forgive Me 💖</button>
        <button class="no" onmouseover="moveButton(this)">Still Angry 😡</button>
    </div>
</div>

<script>

// Typing effect
let message = "I didn't mean to hurt you... Please give forgiveme 🥺";
let i = 0;
function typing(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}
typing();

// Hearts on teddy click
function showLove(){
    for(let i=0;i<30;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.top = "80vh";
        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },3000);
    }
}

// Forgive screen
function forgive(){
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#a18cd1,#fbc2eb);color:white;text-align:center;flex-direction:column;">
        <h1 style="font-size:50px">Yayyy!! 😍</h1>
        <p style="font-size:22px">You made me the happiest person ❤️\nI promise I will never hurt you again 💖</p>
        <div style="font-size:120px">🧸💞</div>
    </div>`;
}

// Moving NO button
function moveButton(btn){
    btn.style.position = "absolute";
    btn.style.top = Math.random()*80 + "vh";
    btn.style.left = Math.random()*80 + "vw";
}

</script>

</body>
</html>
